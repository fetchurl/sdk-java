name: Autorelease

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      new_version:
        description: "svu mode (next|patch|minor|major) or explicit semver (e.g. 0.1.0)"
        type: string
        default: next

jobs:
  autorelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup git config
        run: |
          git config user.name actions-bot
          git config user.email actions-bot@users.noreply.github.com

      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Unit tests
        run: mvn -B test

      - name: Prepare release (svu, commit, local tag)
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          set -euo pipefail
          VERSION="$(./make_release prepare "$NEW_VERSION")"
          # No tags yet: svu "next" is often 0.0.0 — fall back to POM or 0.1.0.
          if [[ "$VERSION" == "0.0.0" || "$VERSION" == "v0.0.0" ]]; then
            POM_VER="$(python3 -c "import re,pathlib; t=pathlib.Path('pom.xml').read_text(); m=re.search(r'<artifactId>fetchurl-sdk</artifactId>\s*<version>([^<]+)</version>', t); print(m.group(1) if m else '')")"
            if [[ -n "$POM_VER" && "$POM_VER" != "0.0.0" ]]; then
              FALLBACK="$POM_VER"
            else
              FALLBACK="0.1.0"
            fi
            echo "svu returned $VERSION; re-preparing as $FALLBACK" >> "$GITHUB_STEP_SUMMARY"
            VERSION="$(./make_release prepare "$FALLBACK")"
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Prepared $VERSION (not pushed until publish succeeds)" >> "$GITHUB_STEP_SUMMARY"

      - name: Import GPG key
        if: env.RELEASE_VERSION != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "GPG_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi
          if [[ -z "${GPG_PASSPHRASE:-}" ]]; then
            echo "GPG_PASSPHRASE secret is not set" >&2
            exit 1
          fi

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' 'allow-loopback-pinentry' 'default-cache-ttl 3600' 'max-cache-ttl 3600' > ~/.gnupg/gpg-agent.conf
          printf '%s\n' 'use-agent' 'pinentry-mode loopback' > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent 2>/dev/null || true

          KEYFILE="$(mktemp)"
          # Preserve exact secret body (newlines). Also accept secrets stored with literal \n.
          python3 - "$KEYFILE" <<'PY'
          import os, pathlib, sys
          out = pathlib.Path(sys.argv[1])
          raw = os.environ["GPG_PRIVATE_KEY"]
          if "BEGIN PGP" not in raw and "\\n" in raw:
              raw = raw.encode("utf-8").decode("unicode_escape")
          # Normalize Windows newlines
          raw = raw.replace("\r\n", "\n").replace("\r", "\n")
          if not raw.endswith("\n"):
              raw += "\n"
          out.write_text(raw)
          PY

          if ! grep -qE 'BEGIN PGP (PRIVATE|SECRET) KEY BLOCK' "$KEYFILE"; then
            echo "GPG_PRIVATE_KEY is not an armored private key (need BEGIN PGP PRIVATE KEY BLOCK)" >&2
            echo "Preview: $(head -c 60 "$KEYFILE" | tr -cd '[:print:]\n')" >&2
            exit 1
          fi

          gpg --batch --import "$KEYFILE"
          rm -f "$KEYFILE"

          if ! gpg --batch --list-secret-keys --with-colons | grep -q '^sec:'; then
            echo "Import reported success but no secret keys are present." >&2
            echo "Re-set GPG_PRIVATE_KEY from: gpg --export-secret-keys --armor <FINGERPRINT>" >&2
            gpg --batch --list-keys || true
            exit 1
          fi

          gpg --batch --list-secret-keys --keyid-format LONG
          FPR="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          echo "GPG_KEYNAME=$FPR" >> "$GITHUB_ENV"
          echo "Using signing key $FPR"

          # Warm agent / verify passphrase works
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --local-user "$FPR" --clearsign -o /tmp/gpg-unlock.asc <<<'unlock' \
            || { echo "Passphrase does not unlock the imported key" >&2; exit 1; }
          rm -f /tmp/gpg-unlock.asc

      - name: Publish to Maven Central
        if: env.RELEASE_VERSION != ''
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${MAVEN_USERNAME:-}" || -z "${MAVEN_PASSWORD:-}" ]]; then
            echo "MAVEN_USERNAME / MAVEN_PASSWORD not set" >&2
            exit 1
          fi
          if [[ -z "${MAVEN_GPG_PASSPHRASE:-}" ]]; then
            echo "GPG_PASSPHRASE not set" >&2
            exit 1
          fi
          if ! gpg --batch --list-secret-keys --with-colons | grep -q '^sec:'; then
            echo "No GPG secret key in keyring" >&2
            exit 1
          fi

          mkdir -p ~/.m2
          python3 - <<'PY'
          import os
          from pathlib import Path
          user = os.environ["MAVEN_USERNAME"]
          pw = os.environ["MAVEN_PASSWORD"]
          Path.home().joinpath(".m2").mkdir(parents=True, exist_ok=True)
          Path.home().joinpath(".m2/settings.xml").write_text(
              f"""<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>{user}</username>
                <password>{pw}</password>
              </server>
            </servers>
          </settings>
          """
          )
          PY

          # Passphrase via MAVEN_GPG_PASSPHRASE (maven-gpg-plugin 3.2+); key from import step
          mvn -B -DskipTests deploy -Prelease -Dgpg.keyname="${GPG_KEYNAME}"
          echo "Published $RELEASE_VERSION to Maven Central (Sonatype Portal)" >> "$GITHUB_STEP_SUMMARY"

      - name: Push commit, tag, and GitHub release
        if: env.RELEASE_VERSION != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./make_release push "$RELEASE_VERSION"
