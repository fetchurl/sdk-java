name: Autorelease

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      new_version:
        description: "Version bump mode (svu) or explicit x.y.z"
        type: choice
        default: next
        options: [next, patch, minor, major]

jobs:
  autorelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup git config
        run: |
          git config user.name actions-bot
          git config user.email actions-bot@users.noreply.github.com

      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Unit tests
        run: mvn -B test

      - name: Prepare release (svu, commit, local tag)
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          VERSION="$(./make_release prepare "$NEW_VERSION")"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Prepared $VERSION (not pushed until publish succeeds)" >> "$GITHUB_STEP_SUMMARY"

      - name: Import GPG key
        if: env.RELEASE_VERSION != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "GPG_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf 'allow-loopback-pinentry\n' > ~/.gnupg/gpg-agent.conf
          printf 'use-agent\npinentry-mode loopback\n' > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent 2>/dev/null || true
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          if [[ -n "${GPG_KEY_ID:-}" ]]; then
            echo "Imported key; using GPG_KEY_ID=$GPG_KEY_ID"
            echo "GPG_KEYNAME=$GPG_KEY_ID" >> "$GITHUB_ENV"
          else
            KEYNAME="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
            echo "GPG_KEYNAME=$KEYNAME" >> "$GITHUB_ENV"
            echo "Using fingerprint $KEYNAME"
          fi
          # Keep agent ready for maven-gpg-plugin
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 \
            --list-secret-keys >/dev/null

      - name: Publish to Maven Central
        if: env.RELEASE_VERSION != ''
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [[ -z "${MAVEN_USERNAME:-}" || -z "${MAVEN_PASSWORD:-}" ]]; then
            echo "MAVEN_USERNAME / MAVEN_PASSWORD not set" >&2
            exit 1
          fi
          if [[ -z "${GPG_PASSPHRASE:-}" ]]; then
            echo "GPG_PASSPHRASE not set" >&2
            exit 1
          fi
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${MAVEN_USERNAME}</username>
                <password>${MAVEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          mvn -B -DskipTests deploy -Prelease \
            -Dgpg.keyname="${GPG_KEYNAME}" \
            -Dgpg.passphrase="${GPG_PASSPHRASE}"
          echo "Published $RELEASE_VERSION to Maven Central (Sonatype Portal)" >> "$GITHUB_STEP_SUMMARY"

      - name: Push commit, tag, and GitHub release
        if: env.RELEASE_VERSION != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./make_release push "$RELEASE_VERSION"
