name: Autorelease

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      new_version:
        description: "svu mode (next|patch|minor|major) or explicit semver (e.g. 0.1.0)"
        type: string
        default: next

jobs:
  autorelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup git config
        run: |
          git config user.name actions-bot
          git config user.email actions-bot@users.noreply.github.com

      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Unit tests
        run: mvn -B test

      - name: Prepare release (svu, commit, local tag)
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          set -euo pipefail
          VERSION="$(./make_release prepare "$NEW_VERSION")"
          if [[ "$VERSION" == "0.0.0" || "$VERSION" == "v0.0.0" ]]; then
            POM_VER="$(python3 -c "import re,pathlib; t=pathlib.Path('pom.xml').read_text(); m=re.search(r'<artifactId>fetchurl-sdk</artifactId>\s*<version>([^<]+)</version>', t); print(m.group(1) if m else '')")"
            FALLBACK="${POM_VER:-0.1.0}"
            [[ "$FALLBACK" == "0.0.0" ]] && FALLBACK="0.1.0"
            echo "svu returned $VERSION; re-preparing as $FALLBACK" >> "$GITHUB_STEP_SUMMARY"
            VERSION="$(./make_release prepare "$FALLBACK")"
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Prepared $VERSION (not pushed until publish succeeds)" >> "$GITHUB_STEP_SUMMARY"

      # Prefer base64 secret (newlines-safe). Falls back to armored GPG_PRIVATE_KEY with repair.
      - name: Import GPG key
        if: env.RELEASE_VERSION != ''
        id: import_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_BASE64: ${{ secrets.GPG_PRIVATE_KEY_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${GPG_PASSPHRASE:-}" ]]; then
            echo "GPG_PASSPHRASE secret is not set" >&2
            exit 1
          fi

          KEYFILE="$(mktemp)"
          python3 - "$KEYFILE" <<'PY'
          import base64, os, pathlib, re, sys

          out = pathlib.Path(sys.argv[1])
          b64 = os.environ.get("GPG_PRIVATE_KEY_BASE64") or ""
          raw = os.environ.get("GPG_PRIVATE_KEY") or ""

          if b64.strip():
              # Newlines-safe path (recommended)
              data = base64.b64decode(b64.strip().encode("ascii"), validate=False)
              text = data.decode("utf-8", errors="replace")
              source = "GPG_PRIVATE_KEY_BASE64"
          elif raw.strip():
              text = raw
              source = "GPG_PRIVATE_KEY"
              # Literal backslash-n (password manager paste)
              if "BEGIN PGP" not in text and "\\n" in text:
                  text = text.encode("utf-8").decode("unicode_escape")
              text = text.replace("\r\n", "\n").replace("\r", "\n")
              # Entire armor crushed onto one line — rebuild standard armor lines
              if "BEGIN PGP" in text and text.count("\n") < 3:
                  m = re.search(
                      r"-----BEGIN PGP (PRIVATE|SECRET) KEY BLOCK-----(.*)-----END PGP (PRIVATE|SECRET) KEY BLOCK-----",
                      text,
                      re.S,
                  )
                  if m:
                      kind = m.group(1)
                      body = re.sub(r"\s+", "", m.group(2))
                      # Optional headers (Comment:, Version:) end at first blank in real armor;
                      # for crushed keys there usually are none — treat all as base64 body.
                      lines = [body[i : i + 64] for i in range(0, len(body), 64)]
                      text = (
                          f"-----BEGIN PGP {kind} KEY BLOCK-----\n"
                          + "\n".join(lines)
                          + f"\n-----END PGP {kind} KEY BLOCK-----\n"
                      )
          else:
              print("Set GPG_PRIVATE_KEY_BASE64 (preferred) or GPG_PRIVATE_KEY", file=sys.stderr)
              sys.exit(1)

          text = text.replace("\r\n", "\n").replace("\r", "\n")
          if not text.endswith("\n"):
              text += "\n"
          out.write_text(text)

          lines = text.count("\n")
          has_priv = "BEGIN PGP PRIVATE KEY BLOCK" in text or "BEGIN PGP SECRET KEY BLOCK" in text
          has_end = "END PGP PRIVATE KEY BLOCK" in text or "END PGP SECRET KEY BLOCK" in text
          print(f"source={source} bytes={len(text)} lines={lines} has_private_header={has_priv} has_end={has_end}")
          if not has_priv or not has_end:
              print("Armor headers incomplete after decode/repair", file=sys.stderr)
              sys.exit(1)
          PY

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' 'allow-loopback-pinentry' 'default-cache-ttl 3600' 'max-cache-ttl 3600' > ~/.gnupg/gpg-agent.conf
          printf '%s\n' 'use-agent' 'pinentry-mode loopback' > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent 2>/dev/null || true

          # Show import status (no key material)
          gpg --batch --status-fd 1 --import "$KEYFILE" 2>&1 | tee /tmp/gpg-import.log | sed 's/^/gpg-import: /'
          rm -f "$KEYFILE"

          if ! grep -qE 'IMPORT_OK|SECRET_KEY_IMPORTED|IMPORT_RES [1-9]' /tmp/gpg-import.log \
            && ! gpg --batch --list-secret-keys --with-colons | grep -q '^sec:'; then
            echo "GPG import produced no secret keys. Re-upload with base64 (see workflow docs in PR/commit)." >&2
            cat /tmp/gpg-import.log >&2 || true
            exit 1
          fi

          if ! gpg --batch --list-secret-keys --with-colons | grep -q '^sec:'; then
            echo "Still no secret keys after import" >&2
            exit 1
          fi

          gpg --batch --list-secret-keys --keyid-format LONG
          FPR="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          echo "GPG_KEYNAME=$FPR" >> "$GITHUB_ENV"
          echo "Using signing key $FPR"

          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --local-user "$FPR" --clearsign -o /tmp/gpg-unlock.asc <<<'unlock' \
            || { echo "Passphrase does not unlock the imported key" >&2; exit 1; }
          rm -f /tmp/gpg-unlock.asc

      - name: Publish to Maven Central
        if: env.RELEASE_VERSION != ''
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.m2
          python3 - <<'PY'
          import os
          from pathlib import Path
          user = os.environ["MAVEN_USERNAME"]
          pw = os.environ["MAVEN_PASSWORD"]
          Path.home().joinpath(".m2").mkdir(parents=True, exist_ok=True)
          Path.home().joinpath(".m2/settings.xml").write_text(
              f"""<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>{user}</username>
                <password>{pw}</password>
              </server>
            </servers>
          </settings>
          """
          )
          PY
          mvn -B -DskipTests deploy -Prelease -Dgpg.keyname="${GPG_KEYNAME}"
          echo "Published $RELEASE_VERSION to Maven Central (Sonatype Portal)" >> "$GITHUB_STEP_SUMMARY"

      - name: Push commit, tag, and GitHub release
        if: env.RELEASE_VERSION != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./make_release push "$RELEASE_VERSION"
